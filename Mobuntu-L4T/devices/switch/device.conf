# Mobuntu-L4T — Device Configuration
# Device: Nintendo Switch
# Codename: Happy Mask Salesman
# Version: 0.1.0

# ── Device Identity ───────────────────────────────────────────────────────────
DEVICE_CODENAME="switch"
DEVICE_BRAND="Nintendo"
DEVICE_MODEL="Switch"

# ── Build Configuration ───────────────────────────────────────────────────────
# L4T flavor passed to upstream apply.sh
# Options: kde-noble, gnome-noble, unity-noble, kde-jammy, gnome-jammy
L4T_FLAVOR="kde-noble"

# ── UI Selection ──────────────────────────────────────────────────────────────
# Options: phosh, plasma-mobile, kde, lxde, mate
# NOTE: gnome is explicitly excluded — known L4T regressions
DEVICE_UI="phosh"

# ── User Preseed (optional) ───────────────────────────────────────────────────
# Leave blank to trigger OOBE on first boot instead
PRESEED_USERNAME=""
PRESEED_PASSWORD=""
PRESEED_HOSTNAME="mobuntu-switch"

# ── Joy-Con ───────────────────────────────────────────────────────────────────
# Calibration data is dumped via Hekate before booting L4T
# See docs/HEKATE_CALIBRATION.md
ENABLE_JOYCON="true"

# ── Kernel / Initramfs ────────────────────────────────────────────────────────
# NOT built by Mobuntu-L4T — sourced from upstream Switchroot
# See upstream/UPSTREAM_SOURCES.md for download links and checksums
KERNEL_SOURCE="switchroot-upstream"
