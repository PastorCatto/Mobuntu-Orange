# Mobuntu-PS4 — Device Configuration
# Codename: Spider-Man
# Version: 0.1.0

# ── Device Identity ───────────────────────────────────────────────────────────
DEVICE_CODENAME="ps4"
DEVICE_BRAND="Sony"
DEVICE_MODEL="PlayStation 4"

# ── Build Configuration ───────────────────────────────────────────────────────
# Debian suite: bookworm (stable) or trixie (testing — Mesa 25 native)
# Trixie recommended for Mesa 25 availability without custom repos
DEBIAN_SUITE="trixie"

# ── UI Selection ──────────────────────────────────────────────────────────────
# Options: gnustep (primary), lxde, lxqt
# Target: sub-600MB RAM idle, X11 + Steam capable
DEVICE_UI="gnustep"

# ── User Preseed (optional) ───────────────────────────────────────────────────
# Leave blank to configure on first boot
PRESEED_USERNAME=""
PRESEED_PASSWORD=""
PRESEED_HOSTNAME="mobuntu-ps4"

# ── Boot / Platform ───────────────────────────────────────────────────────────
# Set via -p flag at build time: external | aeolia | belize
# external  — USB/external storage boot (any PS4 board)
# aeolia    — Internal HDD boot, older fat PS4 (Aeolia southbridge)
# belize    — Internal HDD boot, PS4 Slim/newer (Belize southbridge)
# Default here is a hint only — -p flag always takes precedence
DEFAULT_PLATFORM="external"

# ── Kernel Reference ─────────────────────────────────────────────────────────
# Kernel NOT built by Mobuntu-PS4 — place bzImage at upstream/bzImage
# See upstream/UPSTREAM_SOURCES.md for download links
KERNEL_CODENAME="strawberry"
KERNEL_VERSION="6.18.21"
KERNEL_SOURCE="rmuxnet/ps4-linux-12xx"

# ── Mesa ─────────────────────────────────────────────────────────────────────
# Built via FalsePhilosopher/mesa-docker-ps4 Docker container at build time
# See scripts/build-mesa.sh
MESA_SOURCE="FalsePhilosopher/mesa-docker-ps4"
MESA_VERSION="25"
