# devices/fajita/device.conf
# OnePlus 6T — Qualcomm SDM845
# Confirmed booting: arkadin91 PDK image 2026-04-30

DEVICE_CODENAME="fajita"
DEVICE_BRAND="oneplus"
DEVICE_MODEL="OnePlus 6T"
DEVICE_SOC="sdm845"

# ── Suite ────────────────────────────────────────────────────────────────────
# Upstream ships this as resolute — kept as original author intent
# build.sh double-confirmation gate applies
DEVICE_SUITE="resolute"

# ── Kernel ───────────────────────────────────────────────────────────────────
KERNEL_APT_NAME="linux-image-6.18-sdm845"
KERNEL_HEADERS_APT_NAME="linux-headers-6.18-sdm845"
KERNEL_VERSION="6.18-sdm845"

KERNEL_IMAGE_URL="https://github.com/arkadin91/packages-sdm845/releases/download/OnePlus6T/linux-image-7.1.0-rc1-sdm845.deb"
KERNEL_HEADERS_URL="https://github.com/arkadin91/packages-sdm845/releases/download/OnePlus6T/linux-headers-7.1.0-rc1-sdm845.deb"

# ── Firmware ─────────────────────────────────────────────────────────────────
FW_DEB="linux-firmware-oneplus-sdm845.deb"
FW_ARCHIVE_URL="https://github.com/arkadin91/packages-sdm845/releases/download/OnePlus6T/firmware-oneplus-sdm845.tar.gz"

# ── Audio ────────────────────────────────────────────────────────────────────
ALSA_UCM_URL="https://repo.mobian.org/pool/main/a/alsa-ucm-conf/alsa-ucm-conf_1.2.15.3-1mobian3_all.deb"
DEVICE_MASKED_SERVICES="alsa-state alsa-restore"

# ── Display variants ─────────────────────────────────────────────────────────
DEVICE_DISPLAYS="default"
DEVICE_DEFAULT_DISPLAY="default"
DEVICE_DTB_DEFAULT="sdm845-oneplus-fajita.dtb"

# ── Packages ─────────────────────────────────────────────────────────────────
DEVICE_PACKAGES="abootimg zstd hexagonrpcd libqrtr-glib0"

# ── Services ─────────────────────────────────────────────────────────────────
DEVICE_SERVICES="hexagonrpcd grow-rootfs"

HEXAGONRPCD_AFTER="multi-user.target"

# ── UI ──────────────────────────────────────────────────────────────────────
# Options: ubuntu-desktop-minimal, phosh, plasma-mobile
DEVICE_UI="ubuntu-desktop-minimal"
